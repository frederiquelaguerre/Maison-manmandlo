  <style>
    /* ---- Booking hero ---- */
    .reservation-hero {
      background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-dark) 100%);
      padding: 100px 20px 48px;
      text-align: center;
      color: #fff;
    }

    .reservation-hero h1 {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 6vw, 3.5rem);
      margin-bottom: 12px;
      color: #fff;
    }

    .reservation-hero p {
      font-size: 1rem;
      opacity: 0.9;
      max-width: 560px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ---- iframe wrapper ---- */
    .booking-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 16px 60px;
    }

    .booking-frame-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.10);
      overflow: hidden;
    }

    #bookingengine {
      display: block;
      width: 100%;
      border: none;
      min-height: 600px;
      transition: height 0.3s ease;
    }

    /* ---- Loading spinner ---- */
    .booking-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
      color: var(--color-text-muted);
    }

    .booking-loader .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: var(--color-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ---- Booking footer ---- */
    .reservation-footer {
      background-color: #222;
      color: rgba(255,255,255,0.55);
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
    }

    .reservation-footer a {
      color: var(--color-primary);
    }

    @media (max-width: 576px) {
      .booking-wrapper {
        padding: 24px 8px 40px;
      }
      .booking-frame-container {
        border-radius: 10px;
      }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <script>
    (function () {
      const iframe  = document.getElementById('bookingengine');
      const loader  = document.getElementById('booking-loader');
      const DEFAULT_HEIGHT = 3800;

      function showIframe(height) {
        iframe.style.height  = (height || DEFAULT_HEIGHT) + 'px';
        iframe.style.opacity = '1';
        loader.style.display = 'none';
      }

      window.addEventListener('message', function (e) {
        if (e.source !== iframe.contentWindow) return;
        var h = null;
        if (typeof e.data === 'number' && e.data > 100) {
          h = e.data;
        } else if (e.data && typeof e.data.height === 'number' && e.data.height > 100) {
          h = e.data.height;
        }
        if (h) {
          iframe.style.height = h + 'px';
          showIframe(h);
        }
      });

      var fallbackTimer = setTimeout(function () {
        showIframe(DEFAULT_HEIGHT);
      }, 4000);

      iframe.addEventListener('load', function () {
        clearTimeout(fallbackTimer);
        setTimeout(function () {
          if (loader.style.display !== 'none') {
            showIframe(DEFAULT_HEIGHT);
          }
        }, 500);
      });
    })();
  </script>
